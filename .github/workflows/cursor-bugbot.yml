name: Request Cursor Bugbot Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: cursor-bugbot-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  request-review:
    name: Request Bugbot review
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Post Bugbot trigger comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = `<!-- cursor-bugbot-review-request:${sha} -->`;
            const body = `${marker}\nbugbot run`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const alreadyRequested = comments.some((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (alreadyRequested) {
              core.info(`Cursor Bugbot already requested for ${sha}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
